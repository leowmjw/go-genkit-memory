# mise configuration for go-genkit-memory
# https://mise.jdx.dev/

[tools]
go   = "1.26"
# air is installed via go install (see tasks.install below)
# overmind is a native binary; install via brew or go install

[env]
# ─── LLM endpoint (copilot-proxy-go at 127.0.0.1:4141) ────────────────────────
# Default: Copilot Business LLM via copilot-proxy-go
# Override with mise.local.toml or .env to point to a local OpenAI-compatible LLM
LLM_BASE_URL    = "http://127.0.0.1:4141/v1"
LLM_API_KEY     = "copilot"
LLM_MODEL       = "gpt-5.5-mini"
LLM_MODEL_HEAVY = "gpt-5.5"

# OpenAI-compatible interface (consumed by Go app / GenKit)
OPENAI_BASE_URL = "{{env.LLM_BASE_URL}}"
OPENAI_API_KEY  = "{{env.LLM_API_KEY}}"
OPENAI_MODEL    = "{{env.LLM_MODEL}}"

# Application settings
APP_ENV   = "development"
LOG_LEVEL = "debug"

# Go build cache (optional speed-up on CI)
GOFLAGS = "-mod=readonly"

# Memory pipeline data directory (default: .memory in working dir)
# MEMORY_DATA_DIR = ".memory"

# Enterprise TLS CA bundle (refreshed via mise run refresh-local-tls-ca-bundle)
# NODE_EXTRA_CA_CERTS = "cache/LOCAL_TLS/ca-bundle.crt"

# ─── Tasks ────────────────────────────────────────────────────────────────────

[tasks.install]
description = "Install Go-based dev tools (air, copilot-proxy-go)"
run = [
  "go install github.com/air-verse/air@latest",
  "go install github.com/aaamoon/copilot-gpt4-service@latest || echo 'copilot-proxy-go: install from https://github.com/aaamoon/copilot-gpt4-service or place binary in PATH'",
]

[tasks.setup]
description = "First-time setup: install tools, refresh TLS, verify with doctor"
run = """
#!/usr/bin/env bash
set -euo pipefail
echo "=== go-genkit-memory first-time setup ==="
echo ""
echo "1/4  Installing tool versions (go) ..."
mise install
echo ""
echo "2/4  Installing dev tools (air, copilot-proxy-go) ..."
mise run install
echo ""
echo "3/4  Refreshing local TLS CA bundle ..."
mise run refresh-local-tls-ca-bundle || echo "     (skipped — not on enterprise network)"
echo ""
echo "4/4  Running doctor checks ..."
mise run doctor
echo ""
echo "Setup complete! Run 'mise run dev' to start development."
"""

[tasks."refresh-local-tls-ca-bundle"]
description = "Refresh enterprise TLS CA bundle into cache/LOCAL_TLS/"
run = """
#!/usr/bin/env bash
set -euo pipefail
mkdir -p cache/LOCAL_TLS
# Extract system CA certificates into a local bundle for Node/Go TLS verification
# On macOS: export from Keychain; on Linux: copy system bundle
if [ "$(uname)" = "Darwin" ]; then
  security find-certificate -a -p /System/Library/Keychains/SystemRootCertificates.keychain \
    /Library/Keychains/System.keychain > cache/LOCAL_TLS/ca-bundle.crt 2>/dev/null || true
elif [ -f /etc/ssl/certs/ca-certificates.crt ]; then
  cp /etc/ssl/certs/ca-certificates.crt cache/LOCAL_TLS/ca-bundle.crt
elif [ -f /etc/pki/tls/certs/ca-bundle.crt ]; then
  cp /etc/pki/tls/certs/ca-bundle.crt cache/LOCAL_TLS/ca-bundle.crt
else
  echo "WARNING: Could not locate system CA bundle. Set NODE_EXTRA_CA_CERTS manually."
  exit 1
fi
echo "✔ CA bundle written to cache/LOCAL_TLS/ca-bundle.crt"
"""

[tasks.build]
description = "Compile the module"
run = "go build ./..."

[tasks.test]
description = "Run unit tests (no external deps)"
run = "go test ./memory/... ./session/... -race -count=1 -timeout 60s"

[tasks."test:int"]
description = "Run integration tests (no external deps)"
run = "go test ./integration/... -race -count=1 -timeout 120s"

[tasks."test:all"]
description = "Run all tests"
run = "go test ./... -race -count=1 -timeout 120s"

[tasks.dev]
description = "Start all services via Overmind (hot-reload via air)"
run = "overmind start -f Procfile"

[tasks.lint]
description = "Run gofmt and go vet"
run = [
  "gofmt -l -w .",
  "go vet ./...",
]

[tasks."secret-scan"]
description = "Check for accidentally committed secrets"
run = "grep -rn --include='*.go' --include='*.toml' --include='*.env' 'sk-\\|api_key\\|password\\|secret' . | grep -v '_test.go' | grep -v 'AGENTS.md' || echo 'No secrets found.'"

[tasks.doctor]
description = "Verify all local dependencies are installed and reachable"
run = """
#!/usr/bin/env bash
set -euo pipefail

PASS=0
FAIL=0
WARN=0

check() {
  local label="$1"
  local cmd="$2"
  local hint="$3"
  if eval "$cmd" &>/dev/null; then
    echo "  ✔  $label"
    PASS=$((PASS+1))
  else
    echo "  ✘  $label"
    echo "     → $hint"
    FAIL=$((FAIL+1))
  fi
}

warn() {
  local label="$1"
  local cmd="$2"
  local hint="$3"
  if eval "$cmd" &>/dev/null; then
    echo "  ✔  $label"
    PASS=$((PASS+1))
  else
    echo "  ⚠  $label"
    echo "     → $hint"
    WARN=$((WARN+1))
  fi
}

echo ""
echo "go-genkit-memory — dependency doctor"
echo "======================================"
echo ""

# ── Go ────────────────────────────────────────────────────────────────────────
GO_VER=$(go version 2>/dev/null | awk '{print $3}' | sed 's/go//')
if command -v go &>/dev/null && [ "$(printf '%s\\n' "1.26" "$GO_VER" | sort -V | head -1)" = "1.26" ]; then
  echo "  ✔  go $GO_VER (>= 1.26)"
  PASS=$((PASS+1))
else
  echo "  ✘  go >= 1.26 not found (found: ${GO_VER:-none})"
  echo "     → run: mise install"
  FAIL=$((FAIL+1))
fi

# ── air ───────────────────────────────────────────────────────────────────────
check "air (hot-reload)" \\
  "command -v air" \\
  "run: mise run install"

# ── tmux ──────────────────────────────────────────────────────────────────────
check "tmux (required by overmind)" \\
  "command -v tmux" \\
  "macOS: brew install tmux  |  Linux: apt install tmux / dnf install tmux"

# ── overmind ──────────────────────────────────────────────────────────────────
check "overmind (process manager)" \\
  "command -v overmind" \\
  "macOS: brew install overmind  |  Go: go install github.com/DarthSim/overmind/v2@latest"

# ── copilot-proxy-go ──────────────────────────────────────────────────────────
check "copilot-proxy-go (LLM proxy)" \\
  "command -v copilot-gpt4-service || command -v copilot-proxy-go" \\
  "Install: go install github.com/aaamoon/copilot-gpt4-service@latest  (or: mise run install)"

# ── LLM endpoint (copilot-proxy-go or local LLM) ─────────────────────────────
ENDPOINT_URL="${LLM_BASE_URL:-http://127.0.0.1:4141/v1}"
# strip /v1 suffix for the health-check ping
BASE="${ENDPOINT_URL%/v1}"
if curl --silent --max-time 3 --fail "${BASE}" &>/dev/null || \\
   curl --silent --max-time 3 --fail "${ENDPOINT_URL}/models" &>/dev/null; then
  echo "  ✔  LLM endpoint reachable: ${ENDPOINT_URL}"
  PASS=$((PASS+1))
else
  echo "  ✘  LLM endpoint NOT reachable: ${ENDPOINT_URL}"
  echo "     → Option A: Start copilot-proxy-go (run: mise run dev)"
  echo "       Option B: Point LLM_BASE_URL to a local OpenAI-compatible server"
  echo "       (e.g. Ollama at http://localhost:11434/v1)"
  FAIL=$((FAIL+1))
fi

# ── Enterprise TLS CA bundle (optional) ───────────────────────────────────────
warn "Enterprise TLS CA bundle (cache/LOCAL_TLS/ca-bundle.crt)" \\
  "test -f cache/LOCAL_TLS/ca-bundle.crt" \\
  "run: mise run refresh-local-tls-ca-bundle  (optional, for enterprise networks)"

# ── Summary ───────────────────────────────────────────────────────────────────
echo ""
echo "Result: ${PASS} passed, ${FAIL} failed, ${WARN} warnings"
echo ""
if [ "$FAIL" -ne 0 ]; then
  echo "Fix the issues above, then re-run: mise run doctor"
  echo "First-time? Run: mise run setup"
  exit 1
fi
echo "All checks passed. Run 'mise run dev' to start development."
"""
