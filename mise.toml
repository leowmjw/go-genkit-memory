# mise configuration for go-genkit-memory
# https://mise.jdx.dev/

[tools]
go      = "1.26"
# air is installed via go install (see tasks.install below)
# overmind is a native binary; install via brew or go install

[env]
# OpenAI-compatible local endpoint
OPENAI_BASE_URL = "http://aibox:11435/v1"
OPENAI_API_KEY  = "local"
OPENAI_MODEL    = "gpt-oss"

# Application settings
APP_ENV   = "development"
LOG_LEVEL = "debug"

# Go build cache (optional speed-up on CI)
GOFLAGS = "-mod=readonly"

# ─── Tasks ────────────────────────────────────────────────────────────────────

[tasks.install]
description = "Install Go-based dev tools (air)"
run = [
  "go install github.com/air-verse/air@latest",
]

[tasks.build]
description = "Compile the module"
run = "go build ./..."

[tasks.test]
description = "Run unit tests (no external deps)"
run = "go test ./session/... -race -count=1 -timeout 60s"

[tasks."test:int"]
description = "Run integration tests (no external deps)"
run = "go test ./integration/... -race -count=1 -timeout 120s"

[tasks."test:all"]
description = "Run all tests"
run = "go test ./... -race -count=1 -timeout 120s"

[tasks.dev]
description = "Start all services via Overmind (hot-reload via air)"
run = "overmind start -f Procfile"

[tasks.lint]
description = "Run gofmt and go vet"
run = [
  "gofmt -l -w .",
  "go vet ./...",
]

[tasks."secret-scan"]
description = "Check for accidentally committed secrets"
run = "grep -rn --include='*.go' --include='*.toml' --include='*.env' 'sk-\\|api_key\\|password\\|secret' . | grep -v '_test.go' | grep -v 'AGENTS.md' || echo 'No secrets found.'"

[tasks.doctor]
description = "Verify all local dependencies are installed and reachable"
run = """
#!/usr/bin/env bash
set -euo pipefail

PASS=0
FAIL=0

check() {
  local label="$1"
  local cmd="$2"
  local hint="$3"
  if eval "$cmd" &>/dev/null; then
    echo "  ✔  $label"
    PASS=$((PASS+1))
  else
    echo "  ✘  $label"
    echo "     → $hint"
    FAIL=$((FAIL+1))
  fi
}

echo ""
echo "go-genkit-memory — dependency doctor"
echo "======================================"
echo ""

# ── Go ────────────────────────────────────────────────────────────────────────
GO_VER=$(go version 2>/dev/null | awk '{print $3}' | sed 's/go//')
if command -v go &>/dev/null && [ "$(printf '%s\n' "1.26" "$GO_VER" | sort -V | head -1)" = "1.26" ]; then
  echo "  ✔  go $GO_VER (>= 1.26)"
  PASS=$((PASS+1))
else
  echo "  ✘  go >= 1.26 not found (found: ${GO_VER:-none})"
  echo "     → run: mise use go@latest"
  FAIL=$((FAIL+1))
fi

# ── air ───────────────────────────────────────────────────────────────────────
check "air (hot-reload)" \
  "command -v air" \
  "run: go install github.com/air-verse/air@latest  (or: mise run install)"

# ── tmux ──────────────────────────────────────────────────────────────────────
check "tmux (required by overmind)" \
  "command -v tmux" \
  "macOS: brew install tmux  |  Linux: apt install tmux / dnf install tmux"

# ── overmind ──────────────────────────────────────────────────────────────────
check "overmind (process manager)" \
  "command -v overmind" \
  "macOS: brew install overmind  |  Go: go install github.com/DarthSim/overmind/v2@latest"

# ── OpenAI-compatible endpoint ────────────────────────────────────────────────
ENDPOINT_URL="${OPENAI_BASE_URL:-http://aibox:11435/v1}"
# strip /v1 suffix for the health-check ping
BASE="${ENDPOINT_URL%/v1}"
if curl --silent --max-time 3 --fail "${BASE}" &>/dev/null || \
   curl --silent --max-time 3 --fail "${ENDPOINT_URL}/models" &>/dev/null; then
  echo "  ✔  OpenAI endpoint reachable: ${ENDPOINT_URL}"
  PASS=$((PASS+1))
else
  echo "  ✘  OpenAI endpoint NOT reachable: ${ENDPOINT_URL}"
  echo "     → Start your local LLM server (e.g. Ollama: ollama serve)"
  echo "       and ensure OPENAI_BASE_URL is set correctly."
  FAIL=$((FAIL+1))
fi

# ── Summary ───────────────────────────────────────────────────────────────────
echo ""
echo "Result: ${PASS} passed, ${FAIL} failed"
echo ""
if [ "$FAIL" -ne 0 ]; then
  echo "Fix the issues above, then re-run: mise run doctor"
  exit 1
fi
echo "All checks passed. Run 'mise run dev' to start development."
"""
